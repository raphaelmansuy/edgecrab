# cargo-audit configuration for edgecrab
# See: https://github.com/rustsec/rustsec/blob/main/cargo-audit/audit.toml.example

[advisories]
# RUSTSEC-2026-0098 and RUSTSEC-2026-0099 affect rustls-webpki 0.101.7.
# This version is pulled in transitively by aws-smithy-http-client (via rustls 0.21.x),
# which is part of the AWS SDK for Bedrock. The 0.101.x branch of rustls-webpki
# has no patched release; the fix only exists in >= 0.103.12. The AWS SDK has not yet
# updated to use rustls 0.23.x (which would bring in rustls-webpki 0.103.12+).
# Impact is limited: the vulnerability requires certificate misissuance and is only
# reachable after signature verification. We already use rustls-webpki 0.103.12 for
# all direct and other transitive TLS connections.
# Tracked for upgrade: https://github.com/aws/aws-sdk-rust
ignore = [
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
]
