name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust-quality:
    name: Rust — lint & fmt
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/release-version.sh check
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust:
    name: Rust — tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            workspace_test_cmd: cargo test --workspace --exclude edgecrab-lsp
          - os: macos-14
            workspace_test_cmd: cargo test --workspace --exclude edgecrab-lsp --no-run
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/release-version.sh check
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p edgecrab-lsp --all-targets
      - run: ${{ matrix.workspace_test_cmd }}
      - if: matrix.os == 'macos-14'
        run: cargo test -p edgecrab-cli --test plugins_e2e
      - if: matrix.os == 'macos-14'
        run: cargo test -p edgecrab-gateway gateway_keeps_agent_history_isolated_per_chat_session
      - if: matrix.os == 'macos-14'
        run: cargo test -p edgecrab-gateway gateway_session_hooks_fire_across_chat_reset_and_shutdown

  python-sdk:
    name: Python SDK — build & test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: |
          cd sdks/python
          python -m pip install --upgrade pip maturin pytest pytest-asyncio
          python -m pip install -e .
          cargo check -p edgecrab-python
          python -m pytest tests/test_sdk_e2e.py -v

  node-sdk:
    name: Node.js SDK — build & test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          cd sdks/nodejs-native
          npm ci
          npm run build
          npm test

  wasm-sdk:
    name: WASM SDK — build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install wasm-pack --locked
      - run: |
          cd sdks/wasm
          wasm-pack build --target web --dev

  security:
    name: Security audit
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  site:
    name: Site — build check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: site/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: site
      - run: pnpm run build
        working-directory: site
