name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust-quality:
    name: Rust — lint & fmt
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - run: ./scripts/release-version.sh check
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust:
    name: Rust — tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            workspace_test_cmd: cargo test --workspace --exclude edgecrab-lsp
          - os: macos-14
            workspace_test_cmd: cargo test --workspace --exclude edgecrab-lsp --no-run
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - run: ./scripts/release-version.sh check
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p edgecrab-lsp --all-targets
      - run: ${{ matrix.workspace_test_cmd }}
      - if: matrix.os == 'macos-14'
        run: cargo test -p edgecrab-cli --test plugins_e2e
      - if: matrix.os == 'macos-14'
        run: cargo test -p edgecrab-gateway gateway_keeps_agent_history_isolated_per_chat_session
      - if: matrix.os == 'macos-14'
        run: cargo test -p edgecrab-gateway gateway_session_hooks_fire_across_chat_reset_and_shutdown

  python-sdk:
    name: Python SDK — build & test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          cd sdks/python
          python -m pip install --upgrade pip build twine maturin pytest pytest-asyncio
          python -m pip install -e .
          cargo check -p edgecrab-python
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -p pytest_asyncio.plugin tests/test_sdk_e2e.py -v
          python -m build --sdist --outdir dist/
          python -m twine check dist/*

  node-sdk:
    name: Node.js SDK — build & test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            sdks/node/package-lock.json
            sdks/nodejs-native/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify public Node SDK package
        run: |
          cd sdks/node
          npm ci
          npm run build
          npm test
          npm pack --dry-run
      - name: Verify native Node bindings package
        run: |
          cd sdks/nodejs-native
          npm ci
          npm run build
          npm test

  docker-smoke:
    name: Docker — build smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha,scope=ci-docker
          cache-to: type=gha,scope=ci-docker,mode=max

  wasm-sdk:
    name: WASM SDK — build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install wasm-pack --locked
      - run: |
          cd sdks/wasm
          wasm-pack build --target web --dev

  security:
    name: Security audit
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  site:
    name: Site — build check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: site/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: site/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: site
      - run: pnpm run build
        working-directory: site
