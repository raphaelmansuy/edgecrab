name: Release — Python (PyPI)

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to publish (e.g. v0.3.0)'
        required: true
        default: 'v0.3.0'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve version from tag
        id: version
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
        run: |
          TAG="${INPUT_TAG_NAME:-$GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing edgecrab-sdk==$VERSION"

      - name: Sync release version
        run: |
          ./scripts/release-version.sh set "${{ steps.version.outputs.version }}"
          ./scripts/release-version.sh check

      - run: pip install --upgrade build

      - name: Build sdist and wheel
        run: |
          cd sdks/python
          python -m build --outdir dist/

      - uses: actions/upload-artifact@v4
        with:
          name: python-sdk-dist
          path: sdks/python/dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-sdk-dist
          path: dist/

      - name: List dist contents
        run: ls -lh dist/

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
