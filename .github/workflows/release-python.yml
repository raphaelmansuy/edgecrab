name: Release — Python (PyPI)

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Optional tag name to publish; defaults to the selected ref name when left blank'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

concurrency:
  group: release-python-${{ github.repository }}-${{ inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Python release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve version from tag
        id: version
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
        run: |
          TAG="${INPUT_TAG_NAME:-$GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing edgecrab==$VERSION"

      - name: Sync release version
        run: |
          ./scripts/release-version.sh set "${{ steps.version.outputs.version }}"
          ./scripts/release-version.sh check

      - run: pip install --upgrade build twine

      - name: Build source distribution
        run: |
          cd sdks/python
          python -m build --sdist --outdir dist/
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: python-sdk-dist
          path: sdks/python/dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.ref }}
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/download-artifact@v4
        with:
          name: python-sdk-dist
          path: dist/

      - name: List dist contents
        run: ls -lh dist/

      - name: Publish to PyPI (OIDC preferred, token fallback)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          print-hash: true
          # PYPI_API_TOKEN is used when the project is new (OIDC trusted publisher
          # must be registered for existing projects, but works without for token).
          # Once edgecrab is registered as a trusted publisher on pypi.org, this
          # password: line can be removed.
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Verify PyPI registry propagation
        env:
          VERIFY_ATTEMPTS: 24
          VERIFY_SLEEP_SECS: 15
        run: |
          ./scripts/release-verify.sh pypi edgecrab "${{ needs.build.outputs.version }}"
