name: Release — Homebrew Tap

# ──────────────────────────────────────────────────────────────────────────────
# Authentication strategy (preference order)
# ──────────────────────────────────────────────────────────────────────────────
# Option A — SSH Deploy Key (recommended, already configured)
#   Secrets required:
#     HOMEBREW_TAP_DEPLOY_KEY — ed25519 private key installed as a write-access
#                               deploy key on raphaelmansuy/homebrew-tap only
#
#   This is the narrowest credential: it can ONLY push to one repository,
#   it does not expire, and it does not grant API access.
#   Configured via: make configure-homebrew-deploy-key  (see docs/homebrew-tap-setup.md)
#
# Option B — GitHub App token (no long-lived token)
#   Secrets required:
#     HOMEBREW_TAP_APP_ID          — GitHub App ID (numeric)
#     HOMEBREW_TAP_APP_PRIVATE_KEY — RSA PEM private key of the App
#
# Option C — Fine-grained PAT (last resort)
#   Secrets required:
#     HOMEBREW_TAP_PUSH_TOKEN — fine-grained PAT with Contents:write on
#                               raphaelmansuy/homebrew-tap only
#
# If no credential is configured the job exits 0 (skipped, not a failure).
# See docs/homebrew-tap-setup.md for setup instructions.
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["Release — Native Binaries"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Optional tag name to sync into the tap; defaults to the selected ref name when left blank'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: release-homebrew-${{ github.repository }}-${{ inputs.tag_name || github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  sync-tap:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    name: Update raphaelmansuy/homebrew-tap
    runs-on: ubuntu-latest
    env:
      TAP_REPOSITORY: raphaelmansuy/homebrew-tap

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version from tag
        id: version
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          WORKFLOW_RUN_TAG_NAME: ${{ github.event.workflow_run.head_branch }}
        run: |
          TAG="${INPUT_TAG_NAME:-${WORKFLOW_RUN_TAG_NAME:-$GITHUB_REF_NAME}}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download checksums asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern edgecrab-checksums.txt \
            --dir release-assets

      - name: Extract macOS checksums
        id: checksums
        run: |
          ARM_SHA="$(awk '/edgecrab-aarch64-apple-darwin\.tar\.gz/ { print $1 }' release-assets/edgecrab-checksums.txt)"
          X86_SHA="$(awk '/edgecrab-x86_64-apple-darwin\.tar\.gz/ { print $1 }' release-assets/edgecrab-checksums.txt)"
          if [[ -z "$ARM_SHA" || -z "$X86_SHA" ]]; then
            echo "Failed to locate macOS checksums in release-assets/edgecrab-checksums.txt" >&2
            exit 1
          fi
          echo "arm_sha=$ARM_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_sha=$X86_SHA" >> "$GITHUB_OUTPUT"

      # ── Resolve auth method ────────────────────────────────────────────────
      - name: Resolve auth method
        id: auth
        env:
          DEPLOY_KEY:  ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          APP_ID:      ${{ secrets.HOMEBREW_TAP_APP_ID }}
          APP_KEY:     ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          PAT_TOKEN:   ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
        run: |
          if [[ -n "$DEPLOY_KEY" ]]; then
            echo "method=deploy-key" >> "$GITHUB_OUTPUT"
            echo "Using SSH deploy key (HOMEBREW_TAP_DEPLOY_KEY)"
          elif [[ -n "$APP_ID" && -n "$APP_KEY" ]]; then
            echo "method=github-app" >> "$GITHUB_OUTPUT"
            echo "Using GitHub App token"
          elif [[ -n "$PAT_TOKEN" ]]; then
            echo "method=pat" >> "$GITHUB_OUTPUT"
            echo "Using fine-grained PAT (HOMEBREW_TAP_PUSH_TOKEN)"
          else
            echo "method=none" >> "$GITHUB_OUTPUT"
            echo "No push credential configured — tap update will be skipped."
          fi

      - name: Skip if no credential
        if: steps.auth.outputs.method == 'none'
        run: |
          echo "::notice::Homebrew tap update skipped: no push credential configured."
          echo "See docs/homebrew-tap-setup.md to configure HOMEBREW_TAP_DEPLOY_KEY."
          exit 0

      # ── Option B: GitHub App token (only when method=github-app) ──────────
      - name: Generate GitHub App token
        id: app-token
        if: steps.auth.outputs.method == 'github-app'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      # ── Checkout via SSH deploy key (Option A) ─────────────────────────────
      - name: Checkout tap repository (deploy key)
        if: steps.auth.outputs.method == 'deploy-key'
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: homebrew-tap

      # ── Checkout via token (Option B/C) ───────────────────────────────────
      - name: Checkout tap repository (token)
        if: steps.auth.outputs.method == 'github-app' || steps.auth.outputs.method == 'pat'
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ steps.auth.outputs.method == 'github-app' && steps.app-token.outputs.token || secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        if: steps.auth.outputs.method != 'none'
        run: |
          ./scripts/update-homebrew-formula.sh \
            homebrew-tap/Formula/edgecrab.rb \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.checksums.outputs.arm_sha }}" \
            "${{ steps.checksums.outputs.x86_sha }}"

      - name: Commit and push tap update
        if: steps.auth.outputs.method != 'none'
        env:
          METHOD:      ${{ steps.auth.outputs.method }}
          APP_TOKEN:   ${{ steps.app-token.outputs.token }}
          PAT_TOKEN:   ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          TAP_REPO:    ${{ env.TAP_REPOSITORY }}
        run: |
          cd homebrew-tap
          if git diff --quiet -- Formula/edgecrab.rb; then
            echo "Homebrew formula already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/edgecrab.rb
          git commit -m "edgecrab ${{ steps.version.outputs.version }}"
          if [[ "$METHOD" == "deploy-key" ]]; then
            # SSH remote already configured by actions/checkout ssh-key option
            git push origin HEAD:master
          else
            PUSH_TOKEN="${APP_TOKEN:-$PAT_TOKEN}"
            git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${TAP_REPO}.git"
            git push origin HEAD:master
          fi
          echo "::notice::Homebrew formula updated to ${{ steps.version.outputs.version }}"

