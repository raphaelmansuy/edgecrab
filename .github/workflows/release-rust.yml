name: Release — Rust (crates.io)

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to publish from (e.g. v0.3.2)'
        required: true
        default: 'v0.3.2'

permissions:
  contents: write

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # publish_crate <crate> [--no-verify]
      # Retries up to 15 times with a 660 s gap on 429 (new-account rate limit
      # is 1 new crate per 10 minutes after a burst of 5).
      - name: Install publish helper
        run: |
          cat > /usr/local/bin/publish_crate << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          CRATE="$1"; shift
          FLAGS="${*:-}"
          MAX_RETRIES=30
          RETRY_WAIT=660   # 11 minutes — clears the 10-minute new-crate window
          DEPENDENCY_WAIT=30

          for attempt in $(seq 1 $MAX_RETRIES); do
            OUTPUT=$(cargo publish -p "$CRATE" $FLAGS 2>&1) && echo "$OUTPUT" && exit 0 || true
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "already exists on crates.io"; then
              echo "$CRATE already published — skipping."
              exit 0
            fi
            if echo "$OUTPUT" | grep -q "429\|Too Many Requests\|rate limit"; then
              echo "Rate limited. Waiting ${RETRY_WAIT}s before retry $((attempt+1))/$MAX_RETRIES ..."
              sleep $RETRY_WAIT
              continue
            fi
            if echo "$OUTPUT" | grep -Eqi "failed to select a version|candidate versions found which didn't match|no matching package named|failed to get .*edgecrab-|perhaps a crate was updated and forgotten to be re-vendored"; then
              echo "Dependency propagation is not complete yet. Waiting ${DEPENDENCY_WAIT}s before retry $((attempt+1))/$MAX_RETRIES ..."
              sleep $DEPENDENCY_WAIT
              continue
            fi
            echo "Unexpected error publishing $CRATE — aborting."
            exit 1
          done
          echo "All retries exhausted for $CRATE"
          exit 1
          EOF
          chmod +x /usr/local/bin/publish_crate

          cat > /usr/local/bin/wait_for_crate_version << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          CRATE="$1"
          VERSION="$2"
          MAX_ATTEMPTS="${3:-90}"
          WAIT_SECONDS="${4:-10}"
          STABILIZE_SECONDS="${5:-30}"
          INITIAL_WAIT_SECONDS="${6:-30}"
          EXACT_VERSION_URL="https://crates.io/api/v1/crates/$CRATE/$VERSION"
          CRATE_URL="https://crates.io/api/v1/crates/$CRATE"

          echo "Waiting ${INITIAL_WAIT_SECONDS}s before probing crates.io for $CRATE $VERSION propagation..."
          sleep "$INITIAL_WAIT_SECONDS"

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            BODY="$(curl -fsSL "$EXACT_VERSION_URL" 2>/dev/null || true)"
            if [[ -n "$BODY" ]] && echo "$BODY" | jq -e --arg crate "$CRATE" --arg version "$VERSION" '.version | select(.crate == $crate and .num == $version)' >/dev/null; then
              echo "$CRATE $VERSION is visible on crates.io; waiting ${STABILIZE_SECONDS}s for index propagation..."
              sleep "$STABILIZE_SECONDS"
              echo "$CRATE $VERSION propagation wait completed"
              exit 0
            fi
            BODY="$(curl -fsSL "$CRATE_URL" 2>/dev/null || true)"
            if [[ -n "$BODY" ]] && echo "$BODY" | jq -e --arg version "$VERSION" '.crate | select(.max_version == $version)' >/dev/null; then
              echo "$CRATE reports max_version $VERSION on crates.io; waiting ${STABILIZE_SECONDS}s for index propagation..."
              sleep "$STABILIZE_SECONDS"
              echo "$CRATE $VERSION propagation wait completed"
              exit 0
            fi
            echo "Waiting for $CRATE $VERSION to appear on crates.io (attempt $attempt/$MAX_ATTEMPTS)..."
            sleep "$WAIT_SECONDS"
          done

          echo "Timed out waiting for $CRATE $VERSION on crates.io; continuing and relying on publish retries if dependency resolution still lags."
          exit 0
          EOF
          chmod +x /usr/local/bin/wait_for_crate_version

      - name: Verify version consistency
        env:
          INPUT_TAG: ${{ inputs.tag_name }}
        run: |
          TAG_VERSION="${INPUT_TAG:-$GITHUB_REF_NAME}"
          TAG_VERSION="${TAG_VERSION#v}"
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="edgecrab-core") | .version')
          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "ERROR: tag $TAG_VERSION ≠ Cargo.toml $CARGO_VERSION"
            exit 1
          fi
          echo "CRATE_VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: Generate CHANGELOG
        uses: taiki-e/install-action@git-cliff
      - env:
          INPUT_TAG: ${{ inputs.tag_name }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          git-cliff --tag "$TAG" --latest -o RELEASE_NOTES.md

      # Keep this in topological dependency order for crates.io publication.
      - name: Publish edgecrab-types
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-types

      - name: Wait for crates.io index (types)
        run: wait_for_crate_version edgecrab-types "$CRATE_VERSION"

      - name: Publish edgecrab-security
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-security

      - name: Wait for crates.io index (security)
        run: wait_for_crate_version edgecrab-security "$CRATE_VERSION"

      - name: Publish edgecrab-state
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-state

      - name: Wait for crates.io index (state)
        run: wait_for_crate_version edgecrab-state "$CRATE_VERSION"

      - name: Publish edgecrab-cron
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-cron --no-verify

      - name: Wait for crates.io index (cron)
        run: wait_for_crate_version edgecrab-cron "$CRATE_VERSION"

      - name: Publish edgecrab-tools
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-tools --no-verify

      - name: Wait for crates.io index (tools)
        run: wait_for_crate_version edgecrab-tools "$CRATE_VERSION"

      - name: Publish edgecrab-plugins
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-plugins --no-verify

      - name: Wait for crates.io index (plugins)
        run: wait_for_crate_version edgecrab-plugins "$CRATE_VERSION"

      - name: Publish edgecrab-lsp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-lsp --no-verify

      - name: Wait for crates.io index (lsp)
        run: wait_for_crate_version edgecrab-lsp "$CRATE_VERSION"

      - name: Publish edgecrab-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-core --no-verify

      - name: Wait for crates.io index (core)
        run: wait_for_crate_version edgecrab-core "$CRATE_VERSION"

      - name: Publish edgecrab-command-catalog
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-command-catalog --no-verify

      - name: Wait for crates.io index (command-catalog)
        run: wait_for_crate_version edgecrab-command-catalog "$CRATE_VERSION"

      - name: Publish edgecrab-gateway
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-gateway --no-verify

      - name: Wait for crates.io index (gateway)
        run: wait_for_crate_version edgecrab-gateway "$CRATE_VERSION"

      - name: Publish edgecrab-acp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-acp --no-verify

      - name: Wait for crates.io index (acp)
        run: wait_for_crate_version edgecrab-acp "$CRATE_VERSION"

      - name: Publish edgecrab-migrate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-migrate --no-verify

      - name: Wait for crates.io index (migrate)
        run: wait_for_crate_version edgecrab-migrate "$CRATE_VERSION"

      - name: Publish edgecrab-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-cli --no-verify

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
