name: Release — Rust (crates.io)

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to publish from (e.g. v0.1.3)'
        required: true
        default: 'v0.1.3'

permissions:
  contents: write

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # publish_crate <crate> [--no-verify]
      # Retries up to 15 times with a 660 s gap on 429 (new-account rate limit
      # is 1 new crate per 10 minutes after a burst of 5).
      - name: Install publish helper
        run: |
          cat > /usr/local/bin/publish_crate << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          CRATE="$1"; shift
          FLAGS="${*:-}"
          MAX_RETRIES=15
          RETRY_WAIT=660   # 11 minutes — clears the 10-minute new-crate window

          for attempt in $(seq 1 $MAX_RETRIES); do
            OUTPUT=$(cargo publish -p "$CRATE" $FLAGS 2>&1) && echo "$OUTPUT" && exit 0 || true
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "already exists on crates.io"; then
              echo "$CRATE already published — skipping."
              exit 0
            fi
            if echo "$OUTPUT" | grep -q "429\|Too Many Requests\|rate limit"; then
              echo "Rate limited. Waiting ${RETRY_WAIT}s before retry $((attempt+1))/$MAX_RETRIES ..."
              sleep $RETRY_WAIT
              continue
            fi
            echo "Unexpected error publishing $CRATE — aborting."
            exit 1
          done
          echo "All retries exhausted for $CRATE"
          exit 1
          EOF
          chmod +x /usr/local/bin/publish_crate

      - name: Verify version consistency
        env:
          INPUT_TAG: ${{ inputs.tag_name }}
        run: |
          TAG_VERSION="${INPUT_TAG:-$GITHUB_REF_NAME}"
          TAG_VERSION="${TAG_VERSION#v}"
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="edgecrab-core") | .version')
          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "ERROR: tag $TAG_VERSION ≠ Cargo.toml $CARGO_VERSION"
            exit 1
          fi

      - name: Generate CHANGELOG
        uses: taiki-e/install-action@git-cliff
      - env:
          INPUT_TAG: ${{ inputs.tag_name }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          git-cliff --tag "$TAG" --latest -o RELEASE_NOTES.md

      # Keep this in topological dependency order for crates.io publication.
      - name: Publish edgecrab-types
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-types

      - name: Wait for crates.io index (types)
        run: sleep 30

      - name: Publish edgecrab-security
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-security

      - name: Wait for crates.io index (security)
        run: sleep 30

      - name: Publish edgecrab-state
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-state

      - name: Wait for crates.io index (state)
        run: sleep 30

      - name: Publish edgecrab-cron
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-cron --no-verify

      - name: Wait for crates.io index (cron)
        run: sleep 30

      - name: Publish edgecrab-tools
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-tools --no-verify

      - name: Wait for crates.io index (tools)
        run: sleep 30

      - name: Publish edgecrab-plugins
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-plugins --no-verify

      - name: Wait for crates.io index (plugins)
        run: sleep 30

      - name: Publish edgecrab-lsp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-lsp --no-verify

      - name: Wait for crates.io index (lsp)
        run: sleep 30

      - name: Publish edgecrab-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-core --no-verify

      - name: Wait for crates.io index (core)
        run: sleep 30

      - name: Publish edgecrab-command-catalog
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-command-catalog --no-verify

      - name: Wait for crates.io index (command-catalog)
        run: sleep 30

      - name: Publish edgecrab-gateway
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-gateway --no-verify

      - name: Wait for crates.io index (gateway)
        run: sleep 30

      - name: Publish edgecrab-acp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-acp --no-verify

      - name: Wait for crates.io index (acp)
        run: sleep 30

      - name: Publish edgecrab-migrate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-migrate --no-verify

      - name: Wait for crates.io index (migrate)
        run: sleep 30

      - name: Publish edgecrab-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: publish_crate edgecrab-cli --no-verify

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
