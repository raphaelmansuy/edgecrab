name: Release — Docker (GHCR)

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to publish (e.g. v0.3.2)'
        required: true
        default: 'v0.3.2'

permissions:
  contents: read
  packages: write

jobs:
  # ── Extract version once ──────────────────────────────────────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      version:  ${{ steps.v.outputs.version }}
      tag_name: ${{ steps.v.outputs.tag_name }}
    steps:
      - name: Resolve version
        id: v
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
        run: |
          TAG="${INPUT_TAG_NAME:-$GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG"      >> "$GITHUB_OUTPUT"

  # ── Build amd64 — native ubuntu-latest runner ─────────────────────────────────
  build-amd64:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}:${{ needs.meta.outputs.version }}-amd64
          cache-from: type=gha,scope=amd64
          cache-to:   type=gha,scope=amd64,mode=max

  # ── Build arm64 — native ARM64 runner (no QEMU) ───────────────────────────────
  build-arm64:
    needs: meta
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository }}:${{ needs.meta.outputs.version }}-arm64
          cache-from: type=gha,scope=arm64
          cache-to:   type=gha,scope=arm64,mode=max

  # ── Merge both into a single multi-arch manifest ──────────────────────────────
  merge:
    needs: [meta, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:$VERSION" \
            --tag "$IMAGE:latest" \
            "$IMAGE:$VERSION-amd64" \
            "$IMAGE:$VERSION-arm64"

      - name: Inspect final manifest
        run: |
          docker buildx imagetools inspect \
            "ghcr.io/${{ github.repository }}:${{ needs.meta.outputs.version }}"
