name: Release — Native Binaries

# Builds the edgecrab native binary for every supported platform, packages it
# into the expected archive names, and uploads each archive to the GitHub
# Release for that tag.
#
# The npm-cli and pypi-cli wrappers download these archives at install-time, so
# this workflow MUST complete successfully before end-users can install the
# CLI wrappers.
#
# Archive names — must match exactly what sdks/npm-cli/scripts/install.js and
# sdks/pypi-cli/edgecrab_cli/_binary.py expect:
#   edgecrab-x86_64-unknown-linux-gnu.tar.gz
#   edgecrab-aarch64-unknown-linux-gnu.tar.gz
#   edgecrab-x86_64-apple-darwin.tar.gz
#   edgecrab-aarch64-apple-darwin.tar.gz
# Windows publication is intentionally skipped.

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Optional tag name to attach binaries to; defaults to the selected ref name when left blank'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.repository }}-${{ inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  # ── Build each target platform ───────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target:    x86_64-unknown-linux-gnu
            os:        ubuntu-latest
            archive:   edgecrab-x86_64-unknown-linux-gnu.tar.gz

          - target:    aarch64-unknown-linux-gnu
            os:        ubuntu-24.04-arm   # native ARM64 runner — avoids cross-RS BoringSSL issues
            archive:   edgecrab-aarch64-unknown-linux-gnu.tar.gz

          - target:    x86_64-apple-darwin
            os:        macos-14        # arm64 runner; cross-compiles Intel via Xcode SDK
            archive:   edgecrab-x86_64-apple-darwin.tar.gz

          - target:    aarch64-apple-darwin
            os:        macos-14        # Apple Silicon (M1)
            archive:   edgecrab-aarch64-apple-darwin.tar.gz

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref_name || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Ensure Rust target is installed
        run: rustup target add ${{ matrix.target }}

      # ── Compile ──────────────────────────────────────────────────────────────
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} -p edgecrab-cli

      # ── Package ──────────────────────────────────────────────────────────────
      - name: Package binary (.tar.gz)
        shell: bash
        run: |
          cd "target/${{ matrix.target }}/release"
          tar -czf "$GITHUB_WORKSPACE/${{ matrix.archive }}" edgecrab

      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  # ── Attach all archives to the GitHub Release ────────────────────────────────
  upload:
    name: Upload binaries to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets/

      - name: List downloaded assets
        run: ls -lh release-assets/

      - name: Generate checksums manifest
        run: |
          cd release-assets
          shasum -a 256 * > edgecrab-checksums.txt
          cat edgecrab-checksums.txt

      - name: Resolve tag name
        id: tag
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
        run: |
          TAG="${INPUT_TAG_NAME:-$GITHUB_REF_NAME}"
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      # Create a stub release if release-rust.yml hasn't created it yet.
      # softprops/action-gh-release in release-rust.yml will update it later.
      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          gh release view "$TAG" --repo "${{ github.repository }}" \
          || gh release create "$TAG" \
               --repo "${{ github.repository }}" \
               --title "EdgeCrab $TAG" \
               --draft \
               --generate-notes

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          gh release upload "$TAG" release-assets/* \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          gh release edit "$TAG" \
            --repo "${{ github.repository }}" \
            --draft=false
