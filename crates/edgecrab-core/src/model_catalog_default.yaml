# ─── EdgeCrab Model Catalog ─────────────────────────────────────────
#
# Single source of truth for all available models.
# Compiled into the binary as the default; user can override with
# ~/.edgecrab/models.yaml (same format, merged on top).
#
# Kept at parity with edgecode's hermes_cli/models.py
#
# Format:
#   providers:
#     <provider_id>:
#       label: "Human Name"
#       default_model: "model-name"        # optional
#       models:
#         - model: "model-name"
#           context: 200000                 # tokens
#           tier: standard                  # fast | standard | reasoning
#           pricing:                        # optional, per million tokens
#             input: 3.0
#             output: 15.0
#             cache_read: 0.3
#             cache_write: 3.75

